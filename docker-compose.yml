version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai-interview-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-interview-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-interview-backend
    environment:
      DATABASE_URL: mongodb://admin:password@mongodb:27017/ai_interview?authSource=admin
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - ai-interview-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-interview-frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - ai-interview-network

volumes:
  mongodb_data:

networks:
  ai-interview-network:
    driver: bridge
